name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build-rust:
    name: Cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # musl-tools on Ubuntu only covers x86_64 musl, not aarch64.
      # gcc-aarch64-linux-gnu serves as the cross-linker; Rust's self-contained
      # toolchain provides the musl libc for aarch64.
      - name: Configure cross linker
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-musl]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build Lambda crates
        # Build each Lambda separately to avoid binary name collision (all produce 'bootstrap')
        run: |
          cargo build --target aarch64-unknown-linux-musl --package writer
          cargo build --target aarch64-unknown-linux-musl --package reader
          cargo build --target aarch64-unknown-linux-musl --package archival

  cdk-synth:
    name: CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - run: npm ci
        working-directory: cdk

      - run: npx cdk synth
        working-directory: cdk

  cdk-deploy:
    name: CDK deploy
    runs-on: ubuntu-latest
    needs: [build-rust, cdk-synth]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - run: npm ci
        working-directory: cdk

      - run: npx cdk deploy --all --require-approval never
        working-directory: cdk
